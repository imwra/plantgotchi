name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website-astro/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website-astro

      - name: Build Astro site
        run: npm run build
        working-directory: website-astro
        env:
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

      - name: Prepare Pages-compatible output
        working-directory: website-astro
        run: |
          mkdir -p dist-pages/_worker.js
          cp -r dist/client/* dist-pages/
          cp -r dist/server/chunks dist-pages/_worker.js/
          cp dist/server/entry.mjs dist-pages/_worker.js/index.js
          cp dist/server/virtual_astro_middleware.mjs dist-pages/_worker.js/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-pages --project-name=plantgotchi --commit-dirty=true
          workingDirectory: website-astro
