name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website-astro/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website-astro

      - name: Build Astro site
        run: npm run build
        working-directory: website-astro
        env:
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}

      - name: Fix Astro wrangler.json for Pages compatibility
        working-directory: website-astro
        run: |
          python3 -c "
          import json
          with open('dist/server/wrangler.json', 'r') as f:
              d = json.load(f)
          for key in ['assets', 'main', 'rules', 'no_bundle', 'images']:
              d.pop(key, None)
          d['kv_namespaces'] = []
          with open('dist/server/wrangler.json', 'w') as f:
              json.dump(d, f)
          "
          rm -rf .wrangler/deploy

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=plantgotchi --commit-dirty=true
          workingDirectory: website-astro
